<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chai aur code</title>
</head>
<body style="background-color :black ; color :aliceblue">
    
</body>
<script>
    //add a new element into the dom
    const div = document.createElement('div'); // step 1: create a new element
    console.log(div);//log it into console

    //step 2 : add class and id
    div.classname = 'main'
    div.id = Math.round(Math.random()*10 + 1);

    //step 3:add attributes
    div.setAttribute("title","generated title");
    
    //step 4 styling the div
    div.style.backgroundColor = "red";
    div.stylepadding = "40px";
    div.style.margin = "20px";

    //step 5:add text inside div
    div.innerText = "chai aur code";
    const addtext = document.createTextNode("chai aur code");//this is a better and optimized way
    div.appendChild(addtext);

    //important : innerText  → replace content (slower for larger updates)
    //createTextNode → more efficient & controlled DOM manipulation

    //step 6 : add the div to webpage
    document.body.appendChild(div);
</script>
</html>
